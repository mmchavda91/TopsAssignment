 <!-- Task: Create a 3x3 grid of product cards using CSS Grid. Each card should contain: 
• A product image. 
• A product title. 
• A price. 
Additional Requirements: 
• Use grid-template-columns to create the grid layout. 
• Use grid-gap to add spacing between the grid items. 
• Apply hover effects to each card for better interactivity. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Grid</title>
    <link rel="stylesheet" href="Grid.css">
</head>
<body>

<div class="grid-container">
  <div class="card">
    <img src="Image/shoes.jpg" alt="shoes">
    <h3>shoes</h3>
    <p class="price">999</p>
  </div>

  <div class="card">
    <img src="Image/cloth_bag1_2.jpg" alt="bag">
    <h3>Product Name</h3>
    <p class="price">999</p>
  </div>

  <div class="card">
    <img src="Image/cloth.jpg" alt="cloth">
    <h3>Product Name</h3>
    <p class="price">999</p>
  </div>

 
  
</div>

</body>
</html>
