Task: Create a simple webpage layout using Flexbox. The layout should include:

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
</head>

     <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Header */
    .header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    /* Main container using Flexbox */
    .container {
      display: flex;
      min-height: 80vh;

      /* Try changing these to see effects */
      justify-content: flex-start;
      align-items: stretch;
    }

    /* Sidebar */
    .sidebar {
      width: 200px;
      background: #f4f4f4;
      padding: 20px;
    }

    /* Main content */
    .main {
      flex: 1;
      background: #e2e2e2;
      padding: 20px;
    }

    /* Footer */
    .footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
    }

    /* Responsive design */
    @media (max-width: 768px) {
      .container {
        flex-direction :column/* stack vertically */
      }

      .sidebar {
        width: 100%;
      }
    }
  </style>
<body>

  <div class="header">
    <h2>Header</h2>
  </div>

  <div class="container">
    <div class="sidebar">
      <h3>Sidebar</h3>
      <p>Links or menu</p>
    </div>

    <div class="main">
      <h3>Main Content</h3>
      <p>This is the main area.</p>
    </div>
  </div>

  <div class="footer">
    <p>Footer</p>
  </div>
</body>
</html>
