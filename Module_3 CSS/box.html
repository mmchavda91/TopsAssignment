 <!-- Task: Create a profile card layout using the box model. The profile card
shouldinclude:
• A profile picture.
• The user’s name and bio.
• A button to "Follow" the user.  -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
</head>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    /* Center the card */
    .card {
      width: 300px;
      margin: 100px auto; /* centers horizontally */
      padding: 20px;
      border: 2px solid #333;
     

      /* Using border-box */
      box-sizing: content-box;
      text-align: center;
    }

    /* Profile image */
    .profile-img {
      width: 100%;
      height: 100px;
      border: 3px solid #555;
      margin-bottom: 15px;
      border-radius: 20px;

      /* Using content-box */
      box-sizing: content-box;
      padding: 10px;
    }

    .name {
      font-size: 22px;
      margin: 10px 0;
    }

    .bio {
      font-size: 14px;
      color: #555;
      padding: 10px;
      border: 1px solid #ddd;
      margin-bottom: 15px;

      /* Using content-box */
      box-sizing: content-box;
    }

    .follow-btn {
      padding: 10px 20px;
      border: 2px solid #007BFF;
      background-color: #007BFF;
      color: white;
     

      /* Using border-box */
      box-sizing:content-box;
    }

    .follow-btn:hover {
      background-color: #0056b3;
    }
  </style>

<body>

  <div class="card">
    <img src="https://via.placeholder.com/100" alt="Profile Picture" class="profile-img">
    
    <div class="name">John Doe</div>
    
    <div class="bio">
      Web developer who loves creating clean and user-friendly designs.
    </div>
    
    <button class="follow-btn">Follow</button>
  </div>

</body>
</html>
