<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Webpage</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family:'Courier New', Courier, monospace;
        }

        body {
            font-size: 18px;
            /* line-height: 1.6; */
        }

       
        .navbar {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        /* Content layout */
        .container {
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        .column {
            flex: 1; /*“Take equal share of the available space.”*/
            background: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
        }

      
        .footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }

        /* 🔽 Responsive Design */
        @media (max-width: 768px) {
            body {
                font-size: 16px;
                background-color: aquamarine;
            }

            .container {
                flex-direction: column;
                padding: 10px;
            }

            .column {
                padding: 25px;
            }

            .navbar {
                padding: 10px;
            }

            .footer {
                padding: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h1>My Website</h1>
    </div>

    <div class="container">
        <div class="column">
            <h2>Column 1</h2>
            <p>This is the first column content.</p>
        </div>

        <div class="column">
            <h2>Column 2</h2>
            <p>This is the second column content.</p>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 My Website</p>
    </div>

</body>

</html>
