<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #a69797;
    }

    .form-container {
        width: 400px;
        margin: 40px auto;
        padding: 20px;
        background: #fff;

    }

    label {
        display: block;
        margin-top: 15px;
    }

    input, select, textarea, button {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
    }

    button {
        margin-top: 20px;
        color: white;
        border: none;

    }

    button {
        background-color: #0056b3;
    }
</style>

<body>

    <div class="form-container">
        <h2>Contact Us</h2>


        <!-- Full Name -->
        <label for="">Full Name</label>
        <input type="text" required minlength="3" maxlength="50" pattern="[A-Za-z\s]+"
            placeholder="Enter your full name">

        <!-- Email -->
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required maxlength="100" placeholder="Enter your email">

        <!-- Phone -->
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" required pattern="[0-9]{10}"
            placeholder="Enter 10-digit phone number">

        <!-- Subject -->
        <label for="subject">Subject</label>
        <select id="subject" name="subject" required>
            <option value="">-- Select a subject --</option>
            <option value="general">General Inquiry</option>
            <option value="support">Support</option>
            <option value="feedback">Feedback</option>
            <option value="other">Other</option>
        </select>

        <!-- Message -->
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required minlength="10" maxlength="500"
            placeholder="Write your message here"></textarea>

        <!-- Submit Button -->
        <button type="submit">Submit</button>

        </form>
    </div>

</body>

</html>
