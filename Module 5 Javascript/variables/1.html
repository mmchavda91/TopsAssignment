<!-- • Write a JavaScript program to declare variables for different data types
(string,number, boolean, null, and undefined). -->


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>variable and data type</title>
</head>

<body>
    <script>
   // String
    let name = "John Doe";

    // Number
    let age = 25;

    // Boolean
    let isStudent = true;

    // Null
    let emptyValue = null;

    // Undefined
    let notAssigned;

    //  Displaying values and their types
console.log(name);
console.log(age);
console.log(isStudent);
console.log(emptyValue);
console.log(notAssigned);




</script>
</body>

</html>
