<!-- Log the values of the variables and their types to the console using
console.log(). -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

let str = "Hello, JavaScript";   // String
let num = 42;                   // Number
let isActive = true;            // Boolean
let empty = null;               // Null
let notDefined;                 // Undefined


console.log(str);
console.log(num);
console.log(isActive);
console.log(empty);
console.log(notDefined);


</script>
</body>
</html>
