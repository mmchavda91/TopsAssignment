<!-- Write JavaScript code to display an alert box with the message "Welcome
toJavaScript!" when the page loads. -->


<!DOCTYPE html>
<html>
<head>
  <title>Alert Example</title>
</head>
<body>
  <script>
    window.onload = function() {
      alert("Welcome\ntoJavaScript!");
    };
  </script>


</body>
</html>
