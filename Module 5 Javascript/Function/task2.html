<!-- • Create a JavaScript function calculateSumthat takes two numbers as parameters,
adds them, and returns the result. -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function calculateSum(num1, num2) {
            return num1 + num2;
        }

        // Example usage
        let result = calculateSum(5, 10);
        console.log(result);
    </script>
</body>

</html>
