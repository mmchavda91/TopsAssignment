<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!-- 
    Write a do-whileloop that continues to ask the user for input until they enter a
number greater than 10. -->
    <script>
        let num;

do {
    num = prompt("Enter a number greater than 10:");

    // Convert input from string to number
    num = Number(num);

} while (num <= 10);

console.log("You entered a valid number:", num);
    </script>
</body>
</html>
