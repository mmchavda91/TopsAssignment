<!DOCTYPE html>

<body>
    <script>

        // JavaScript program to sum all even numbers between 1 and 20 using while loop

let i = 1;
let sum = 0;

while(i <= 20) {

    // Check if the number is even
    if(i % 2 === 0) {
        sum += i;
    }

    i++;
}

console.log("Sum of even numbers from 1 to 20 is:", sum);
    </script>
</body>
</html>
