<!-- Write a program that changes the background color of a webpage after 5
secondsusing setTimeout() -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Color Change</title>
</head>
<body>
    <h2>Wait for 5 seconds...</h2>

  <script>
    setTimeout(function() {
      document.body.style.backgroundColor = "darkblue";
    }, 5000);  //5000 ms = 5 second
  </script>

</body>
</html>
