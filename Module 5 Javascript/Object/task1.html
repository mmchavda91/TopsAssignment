<!-- Create a JavaScript object carwith properties brand, model, and year. Use
JavaScript to:
• Access and print the car’s brand and model.
• Update the yearproperty.
• Add a new property colorto the car object -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let car = {
  brand: "Toyota",
  model: "Innova",
  year: 2020
};

// Access properties
console.log(car.brand);
console.log(car.model);

// Update year
car.year = 2023;

// Add new property
car.color = "White";

console.log(car.year);
console.log(car.color);
    </script>
</body>
</html>
